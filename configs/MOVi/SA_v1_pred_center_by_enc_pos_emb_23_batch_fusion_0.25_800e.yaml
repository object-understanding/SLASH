_BASE_: "../SA_base.yaml"
SEED: 0
DEVICE: 'cuda'
DATA:
  TYPE: 'movi' # ['clevr', 'CLEVR', 'ptr', 'PTR', 'MOVi', 'movi']
  IMG_SIZE: 128
  NUM_WORKERS: 30
OUTPUT:
  DIR: './output_dir/sa_base_v1_pred_center_by_enc_pos_emb_23_batch_fusion_0.25_movi_800e/'
MODEL:
  SLOT:
    NUM: 7
    DIM: 128
  ENC_DEPTH: 4
  DEC_DEPTH: 6
  HID_DIM: 64
  DEC_HID_DIM: 64
  MLP_HID_DIM: 128
TRAIN:
  EPOCHS: 800
  BATCH_SIZE: 256
  POS_LOSS_WEIGHT: 0.01
WEAK_SUP:
  TYPE: "bbox_center"
  USE_NO_OBJ: False
  RANDOM_PROP: 1.0
  RAND_POS_TYPE: "uniform" # it can be "standard_gaussian"
  INIT_USING_SUP: False
  SPLIT:
    RATIO: 0.1
    TRAIN:
      MODE: 'batch_fusion' # ['','interval', 'epoch_ranges', 'batch_fusion']
      BATCH_FUSION_RATIO: 0.25
POS_PRED:
  USE_POS_PRED: True
  USE_GT: True
  POS_ENC_MODE: "enc_pos_emb"
  LOCATIONS: [2,3] # -1 to last one, 1,2,3,.. to iteration number # TODO: name of variable?