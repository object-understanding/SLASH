_BASE_: "../SA_base.yaml"
SEED: 0
DEVICE: 'cuda'
DATA:
  TYPE: 'ptr' # ['clevr', 'CLEVR', 'ptr', 'PTR', 'msn', 'MSN']
  IMG_SIZE: 128
  NUM_WORKERS: 30
OUTPUT:
  DIR: './output_dir/ptr_savi_lrngau_0.1_0.75/'
TRAIN:
  OPTIMIZER: 'adam'
WEAK_SUP:
  TYPE: 'bbox_center' # ['', 'bbox', 'bbox_center']
  USE_NO_OBJ: False # TODO: find alternative for the variable name 'use_no_obj'
  RAND_PROP: 0.75
  RAND_POS_TYPE: 'learnable_gaussian' # ['uniform', 'standard_gaussian', 'learnable_gaussian']
  INIT_USING_SUP: True
  SPLIT:
    RATIO: 0.1 # [0.01, 0.05, 0.1, 0.2, 0.5, 1.0]
    TRAIN:
      MODE: 'batch_fusion' # ['','interval', 'epoch_ranges', 'batch_fusion']
      BATCH_FUSION_RATIO: 0.25