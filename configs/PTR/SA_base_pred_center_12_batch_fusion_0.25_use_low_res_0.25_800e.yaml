_BASE_: "../SA_base.yaml"
SEED: 0
DEVICE: 'cuda'
DATA:
  TYPE: 'ptr' # ['clevr', 'CLEVR', 'ptr', 'PTR', 'msn', 'MSN']
  IMG_SIZE: 128
  NUM_WORKERS: 30
OUTPUT:
  DIR: './output_dir/sa_base_pred_center_12_batch_fusion_0.25_use_low_res_0.25_ptr_800e/'
TRAIN:
  EPOCHS: 800
  BATCH_SIZE: 256
  POS_LOSS_WEIGHT: 0.01
WEAK_SUP:
  TYPE: "bbox_center"
  USE_NO_OBJ: False
  RANDOM_PROP: 1.0
  RAND_POS_TYPE: "uniform" # it can be "standard_gaussian"
  INIT_USING_SUP: False
  SPLIT:
    RATIO: 0.1
    TRAIN:
      MODE: 'batch_fusion' # ['','interval', 'epoch_ranges', 'batch_fusion']
      BATCH_FUSION_RATIO: 0.25
POS_PRED:
  USE_POS_PRED: True
  USE_GT: True
  POS_ENC_MODE: "learnable"
  LOCATIONS: [1,2]
MODEL:
  FEAT_PYRAMID:
    RES_RATE_LIST: [1., 0.25] # use can add element (candidate: 1, 0.5, 0.25, 0.125) as much as NUM_LOW_RES