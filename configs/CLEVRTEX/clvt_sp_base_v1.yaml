# v3
# deepen mlp depth from 2 to 4
# enlarge mlp hid dim from 64 to 128
_BASE_: "../SA_base.yaml"
SEED: 0
DEVICE: 'cuda'
DATA:
  TYPE: 'clevrtex' # ['clevr', 'CLEVR', 'ptr', 'PTR', 'msn', 'MSN']
  IMG_SIZE: 128
  NUM_WORKERS: 30
TRAIN:
  EPOCHS: 100
OUTPUT:
  DIR: './output_dir/clvt_sp_base_v1/'
MODEL:
  SET_PREDICTION: 
    MLP_HID_DIM: 128 
    MLP_DEPTH: 4
    NUM_CLASSES: 7
  SLOT:
    NUM: 11
SET_PREDICTION:
  LOSS: "huber" # ['huber', 'bce']
  ATTRIBUTES: ["shape"]
  USE_SEPARATE_POS: False
  DISTANCE_THRESHOLDS: [0.05, 0.1, 0.2, 0.3, -1]

